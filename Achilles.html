document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

{{ false }}\">\n        <div style=\"position:absolute;top:42px;right:0;width:290px;background:rgba(252,253,248,0.92);backdrop-filter:{{ glassBlur }};-webkit-backdrop-filter:{{ glassBlur }};border:1px solid rgba(26,29,23,0.12);border-radius:13px;box-shadow:0 18px 50px -12px rgba(26,29,23,0.30),inset 0 1px 0 rgba(255,255,255,0.7);padding:7px;z-index:60;animation:cp-rise .18s ease-out;\">\n          <div style=\"font-size:11px;color:#9AA0A6;padding:6px 9px 7px;\">Timeline</div>\n          <sc-for list=\"{{ snapshots }}\" as=\"snap\" hint-placeholder-count=\"2\">\n            <button onclick=\"{{ snap.choose }}\" style=\"display:block;width:100%;text-align:left;padding:9px 10px;border:none;background:{{ snap.bg }};border-radius:9px;margin-bottom:2px;\">\n              <div style=\"display:flex;align-items:center;gap:8px;\">\n                <span style=\"width:7px;height:7px;border-radius:50%;background:{{ snap.dot }};flex:0 0 auto;\"></span>\n                <span style=\"font-size:12.5px;font-weight:600;color:#1A1D17;\">{{ snap.label }}</span>\n                <span style=\"flex:1;\"></span>\n                <span style=\"font-family:'Geist Mono',monospace;font-size:10px;color:#9AA0A6;\">{{ snap.time }}</span>\n              </div>\n              <div style=\"font-size:11px;color:#6B7167;margin-top:3px;padding-left:15px;line-height:1.4;\">{{ snap.note }}</div>\n            </button>\n          </sc-for>\n        </div>\n      </sc-if>\n    </div>\n\n    <button ref=\"{{ dropRef }}\" onclick=\"{{ startDiff }}\" onpointermove=\"{{ dropMove }}\" onpointerleave=\"{{ dropLeave }}\" style=\"display:flex;align-items:center;gap:8px;height:38px;padding:0 16px 0 14px;background:{{ accent }};border:1px solid rgba(91,138,28,0.5);border-radius:10px;font-size:12.5px;font-weight:600;color:#2c3d10;box-shadow:inset 0 1px 0 rgba(255,255,255,0.7),0 6px 18px -8px rgba(91,138,28,0.6);transition:transform .4s cubic-bezier(0.22,1,0.36,1),box-shadow .2s;\" style-active=\"box-shadow:inset 0 1px 0 rgba(255,255,255,0.7),0 2px 8px -5px rgba(91,138,28,0.6)\">\n      <span style=\"font-size:16px;font-weight:500;line-height:1;\">+</span>\n      Drop in document\n    </button>\n  </div>\n\n  <!-- ============ PROCESSING STRIP ============ -->\n  <sc-if value=\"{{ processing }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:relative;height:46px;flex:0 0 46px;display:flex;align-items:center;gap:12px;padding:0 22px;background:rgba(199,232,112,0.16);border-bottom:1px solid rgba(91,138,28,0.2);overflow:hidden;z-index:25;\">\n      <div style=\"position:absolute;top:0;left:0;height:3px;width:24%;background:{{ accent }};animation:cp-sweep 1.1s ease-in-out infinite;\"></div>\n      <span style=\"width:8px;height:8px;border-radius:50%;background:#5B8A1C;animation:cp-glow 1s ease-in-out infinite;\"></span>\n      <span style=\"font-size:13px;font-weight:600;color:#3c5414;\">Re-testing 8 propositions against 1 new document\u2026</span>\n      <span style=\"font-family:'Geist Mono',monospace;font-size:11px;color:#7a8a5a;\">Internal Defect Log</span>\n    </div>\n  </sc-if>\n\n  <!-- ============ MAIN ROW ============ -->\n  <div style=\"flex:1;display:flex;min-height:0;position:relative;\">\n\n    <!-- LEFT RAIL -->\n    <div style=\"width:252px;flex:0 0 252px;border-right:1px solid rgba(26,29,23,0.09);display:flex;flex-direction:column;padding:18px 14px;gap:7px;background:rgba(247,249,240,0.4);z-index:10;\">\n      <div style=\"position:relative;margin-bottom:6px;\">\n        <span style=\"position:absolute;left:11px;top:50%;transform:translateY(-50%);color:#9AA0A6;font-size:13px;pointer-events:none;\">\u2315</span>\n        <input value=\"{{ search }}\" oninput=\"{{ setSearch }}\" placeholder=\"Search propositions, documents\u2026\" style=\"width:100%;height:36px;padding:0 12px 0 30px;border:1px solid rgba(26,29,23,0.12);border-radius:9px;background:rgba(255,255,255,0.7);font-size:12.5px;color:#1A1D17;outline:none;box-shadow:inset 0 1px 2px rgba(26,29,23,0.04);\">\n      </div>\n\n      <sc-for list=\"{{ tabs }}\" as=\"tab\" hint-placeholder-count=\"3\">\n        <button onclick=\"{{ tab.go }}\" style=\"display:flex;align-items:center;gap:11px;width:100%;height:44px;padding:0 12px;border:1px solid {{ tab.border }};background:{{ tab.bg }};border-radius:11px;text-align:left;transition:background .18s,border-color .18s;\" style-hover=\"background:{{ tab.hoverBg }}\">\n          <span style=\"width:23px;height:23px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;background:{{ tab.iconBg }};color:{{ tab.iconColor }};flex:0 0 auto;\">{{ tab.icon }}</span>\n          <span style=\"font-size:13px;font-weight:{{ tab.weight }};color:{{ tab.color }};flex:1;\">{{ tab.label }}</span>\n          <span style=\"font-family:'Geist Mono',monospace;font-size:10.5px;color:{{ tab.countColor }};\">{{ tab.count }}</span>\n        </button>\n      </sc-for>\n\n      <div style=\"height:1px;background:rgba(26,29,23,0.08);margin:9px 2px;\"></div>\n\n      <button onclick=\"{{ toggleFilters }}\" style=\"display:flex;align-items:center;gap:8px;width:100%;height:30px;padding:0 4px;border:none;background:transparent;text-align:left;\">\n        <span style=\"font-size:12px;font-weight:600;color:#6B7167;flex:1;\">Filters</span>\n        <sc-if value=\"{{ filtersActiveDot }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"width:6px;height:6px;border-radius:50%;background:#5B8A1C;\"></span></sc-if>\n        <span style=\"color:#9AA0A6;font-size:10px;\">{{ filtersCaret }}</span>\n      </button>\n\n      <sc-if value=\"{{ showFilters }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display:flex;flex-direction:column;gap:8px;padding:2px;\">\n          <div style=\"display:flex;flex-wrap:wrap;gap:5px;\">\n            <sc-for list=\"{{ statusChips }}\" as=\"chip\" hint-placeholder-count=\"5\">\n              <button onclick=\"{{ chip.toggle }}\" style=\"display:flex;align-items:center;gap:5px;height:26px;padding:0 9px;border:1px solid {{ chip.border }};background:{{ chip.bg }};border-radius:20px;font-size:11px;color:{{ chip.color }};\">\n                <span style=\"color:{{ chip.dot }};font-size:9px;\">{{ chip.glyph }}</span>{{ chip.label }}\n              </button>\n            </sc-for>\n          </div>\n          <button onclick=\"{{ toggleChanged }}\" style=\"display:flex;align-items:center;gap:7px;height:30px;padding:0 10px;border:1px solid {{ changedBorder }};background:{{ changedBg }};border-radius:8px;font-size:11.5px;color:{{ changedColor }};text-align:left;\">\n            <span style=\"width:6px;height:6px;border-radius:2px;background:{{ accent }};\"></span>Changed since last document\n          </button>\n        </div>\n      </sc-if>\n\n      <div style=\"flex:1;\"></div>\n\n      <div style=\"padding:14px 13px;border:1px solid rgba(26,29,23,0.1);border-radius:13px;background:rgba(255,255,255,0.5);box-shadow:inset 0 1px 0 rgba(255,255,255,0.6);\">\n        <div style=\"font-size:11px;color:#9AA0A6;margin-bottom:10px;\">Case health</div>\n        <div style=\"display:flex;height:8px;border-radius:5px;overflow:hidden;background:rgba(26,29,23,0.06);\">\n          <div style=\"width:{{ caseHealth.bad }};background:#E0533F;\"></div>\n          <div style=\"width:{{ caseHealth.sbad }};background:#D8951F;\"></div>\n          <div style=\"width:{{ caseHealth.neu }};background:#7A8290;\"></div>\n          <div style=\"width:{{ caseHealth.na }};background:#C7CCC2;\"></div>\n          <div style=\"width:{{ caseHealth.sok }};background:#87A330;\"></div>\n          <div style=\"width:{{ caseHealth.ok }};background:#5F9E2E;\"></div>\n        </div>\n        <div style=\"display:flex;justify-content:space-between;margin-top:11px;\">\n          <span style=\"font-size:12px;color:#3a3f35;\"><span style=\"font-family:'Geist Mono',monospace;font-weight:600;\">8</span> propositions</span>\n          <span style=\"font-size:12px;color:{{ caseHealth.flagColor }};font-weight:600;\">{{ caseHealth.flag }}</span>\n        </div>\n      </div>\n    </div>\n\n    <!-- STAGE -->\n    <div ondragover=\"{{ onDragOver }}\" ondragleave=\"{{ onDragLeave }}\" ondrop=\"{{ onDrop }}\" style=\"flex:1;min-width:0;overflow-y:auto;position:relative;\">\n\n      <sc-if value=\"{{ dropActive }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"position:absolute;inset:14px;z-index:40;border:2px dashed #5B8A1C;border-radius:18px;background:rgba(199,232,112,0.28);backdrop-filter:blur(2px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;pointer-events:none;\">\n          <div style=\"font-size:34px;\">\u2b07</div>\n          <div style=\"font-size:16px;font-weight:700;color:#2c3d10;\">Drop the document to re-test the case</div>\n          <div style=\"font-size:12.5px;color:#3c5414;\">Every pleaded proposition will be re-checked against it.</div>\n        </div>\n      </sc-if>\n\n      <!-- ===== TRIAGE ===== -->\n      <sc-if value=\"{{ isTriage }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"padding:34px 40px 80px;max-width:900px;\">\n          <div style=\"display:flex;align-items:baseline;gap:11px;margin-bottom:6px;\">\n            <h1 style=\"font-size:21px;font-weight:700;letter-spacing:-0.02em;margin:0;\">Triage</h1>\n            <span style=\"font-size:12.5px;color:#9AA0A6;\">worst-first, by issue</span>\n          </div>\n          <p style=\"font-size:13px;color:#9AA0A6;margin:0 0 34px;max-width:500px;line-height:1.5;\">Evidence, never law. The map shows what each document <span style=\"color:#6B7167;font-weight:500;\">does</span> to a proposition \u2014 you decide what it means.</p>\n\n          <sc-for list=\"{{ issues }}\" as=\"issue\" hint-placeholder-count=\"3\">\n            <div style=\"margin-bottom:42px;\">\n              <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:17px;\">\n                <h2 style=\"font-size:15.5px;font-weight:700;margin:0;letter-spacing:-0.01em;\">{{ issue.title }}</h2>\n                <div style=\"flex:1;display:flex;height:6px;border-radius:4px;overflow:hidden;background:rgba(26,29,23,0.06);max-width:180px;\">\n                  <div style=\"width:{{ issue.health.bad }};background:#E0533F;\"></div>\n                  <div style=\"width:{{ issue.health.sbad }};background:#D8951F;\"></div>\n                  <div style=\"width:{{ issue.health.neu }};background:#7A8290;\"></div>\n                  <div style=\"width:{{ issue.health.na }};background:#C7CCC2;\"></div>\n                  <div style=\"width:{{ issue.health.sok }};background:#87A330;\"></div>\n                  <div style=\"width:{{ issue.health.ok }};background:#5F9E2E;\"></div>\n                </div>\n                <span style=\"font-family:'Geist Mono',monospace;font-size:11px;color:#b0b5ab;\">{{ issue.summary }}</span>\n              </div>\n\n              <div style=\"display:flex;flex-direction:column;gap:11px;\">\n                <sc-for list=\"{{ issue.props }}\" as=\"p\" hint-placeholder-count=\"3\">\n                  <div onmouseenter=\"{{ p.enter }}\" onmouseleave=\"{{ p.leave }}\" onclick=\"{{ p.open }}\" style=\"position:relative;background:rgba(255,255,255,0.5);border:1px solid {{ p.border }};border-radius:14px;padding:{{ rowPad }} 20px;cursor:pointer;transition:border-color .18s,background .18s,box-shadow .25s,transform .25s;{{ p.rowAnim }}\" style-hover=\"background:rgba(255,255,255,0.94);box-shadow:0 12px 32px -16px rgba(26,29,23,0.24);transform:translateY(-1px)\">\n                    <div style=\"position:absolute;left:0;top:10px;bottom:10px;width:3px;border-radius:3px;background:{{ p.edge }};\"></div>\n                    <div style=\"display:flex;align-items:center;gap:15px;\">\n                      <sc-if value=\"{{ p.isConflict }}\" hint-placeholder-val=\"{{ false }}\">\n                        <span style=\"width:28px;height:28px;flex:0 0 auto;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;background:repeating-linear-gradient(135deg,#E0533F 0 4px,#5F9E2E 4px 8px);box-shadow:0 0 0 1.5px #E0533F;\">\u25b2</span>\n                      </sc-if>\n                      <sc-if value=\"{{ p.notConflict }}\" hint-placeholder-val=\"{{ true }}\">\n                        <span style=\"width:28px;height:28px;flex:0 0 auto;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:13px;background:{{ p.glyphBg }};color:{{ p.statusColor }};\">{{ p.statusGlyph }}</span>\n                      </sc-if>\n                      <div style=\"flex:1;min-width:0;display:flex;align-items:center;gap:10px;\">\n                        <span style=\"font-size:15px;color:#1A1D17;line-height:1.4;font-weight:500;\">{{ p.text }}</span>\n                        <sc-if value=\"{{ p.challenged }}\" hint-placeholder-val=\"{{ false }}\">\n                          <span style=\"flex:0 0 auto;font-size:10px;color:#8a6200;background:rgba(216,149,31,0.16);padding:2px 8px;border-radius:20px;font-weight:600;white-space:nowrap;\">challenged</span>\n                        </sc-if>\n                      </div>\n                      <sc-if value=\"{{ p.single }}\" hint-placeholder-val=\"{{ false }}\">\n                        <span style=\"display:flex;align-items:center;gap:6px;font-size:10.5px;color:#a8893c;white-space:nowrap;flex:0 0 auto;\"><span style=\"width:5px;height:5px;border-radius:50%;background:#D8951F;\"></span>{{ p.singleLabel }}</span>\n                      </sc-if>\n                      <div style=\"display:flex;align-items:center;font-family:'Geist Mono',monospace;font-size:12px;font-weight:600;flex:0 0 auto;\">\n                        <span style=\"color:#5F9E2E;\">{{ p.forCount }}</span>\n                        <span style=\"color:#c8ccc2;margin:0 4px;\">\u00b7</span>\n                        <span style=\"color:{{ p.againstColor }};\">{{ p.againstCount }}</span>\n                      </div>\n                    </div>\n\n                    <sc-if value=\"{{ p.peekOpen }}\" hint-placeholder-val=\"{{ false }}\">\n                      <div style=\"margin-top:14px;padding-top:13px;border-top:1px solid rgba(26,29,23,0.08);\">\n                        <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:11px;\">\n                          <span style=\"font-size:10.5px;font-weight:600;color:{{ p.statusColor }};\">{{ p.statusLabel }}</span>\n                          <span style=\"font-family:'Geist Mono',monospace;font-size:10px;color:#9AA0A6;\">{{ p.srcChip }}</span>\n                        </div>\n                        <div style=\"display:flex;gap:12px;\">\n                          <sc-if value=\"{{ p.hasFor }}\" hint-placeholder-val=\"{{ true }}\">\n                            <div style=\"flex:1;min-width:0;display:flex;gap:8px;\">\n                              <span style=\"font-family:'Geist Mono',monospace;font-size:9px;font-weight:600;color:#3a6b14;background:rgba(95,158,46,0.14);height:18px;padding:0 6px;border-radius:4px;display:flex;align-items:center;flex:0 0 auto;\">{{ p.peekFor.tag }}</span>\n                              <div style=\"min-width:0;\">\n                                <div style=\"font-size:11.5px;color:#2f3a26;line-height:1.45;\">\u201c{{ p.peekFor.quote }}\u201d</div>\n                                <div style=\"font-family:'Geist Mono',monospace;font-size:9.5px;color:#9AA0A6;margin-top:3px;\">{{ p.peekFor.cite }}</div>\n                              </div>\n                            </div>\n                          </sc-if>\n                          <sc-if value=\"{{ p.hasAgainst }}\" hint-placeholder-val=\"{{ false }}\">\n                            <div style=\"flex:1;min-width:0;display:flex;gap:8px;border-left:1px solid rgba(26,29,23,0.08);padding-left:12px;\">\n                              <span style=\"font-family:'Geist Mono',monospace;font-size:9px;font-weight:600;color:#a13322;background:rgba(224,83,63,0.14);height:18px;padding:0 6px;border-radius:4px;display:flex;align-items:center;flex:0 0 auto;\">{{ p.peekAgainst.tag }}</span>\n                              <div style=\"min-width:0;\">\n                                <div style=\"font-size:11.5px;color:#2f3a26;line-height:1.45;\">\u201c{{ p.peekAgainst.quote }}\u201d</div>\n                                <div style=\"font-family:'Geist Mono',monospace;font-size:9.5px;color:#9AA0A6;margin-top:3px;\">{{ p.peekAgainst.cite }}</div>\n                              </div>\n                            </div>\n                          </sc-if>\n                        </div>\n                      </div>\n                    </sc-if>\n                  </div>\n                </sc-for>\n              </div>\n            </div>\n          </sc-for>\n          <sc-if value=\"{{ noResults }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"padding:40px;text-align:center;color:#9AA0A6;font-size:13px;\">No propositions match the current filters.</div>\n          </sc-if>\n        </div>\n      </sc-if>\n\n      <!-- ===== IMPACT (PAIN POINT 2 \u2014 FULL VIEW) ===== -->\n      <sc-if value=\"{{ isImpact }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"padding:46px 40px 90px;max-width:900px;margin:0 auto;animation:cp-impact .5s cubic-bezier(0.22,1,0.36,1);\">\n          <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:16px;\">\n            <span style=\"width:9px;height:9px;border-radius:50%;background:#E0533F;box-shadow:0 0 0 4px rgba(224,83,63,0.16);\"></span>\n            <span style=\"font-size:12.5px;color:#9AA0A6;\">{{ impact.sub }}</span>\n          </div>\n          <h1 style=\"font-size:31px;font-weight:700;letter-spacing:-0.025em;line-height:1.15;margin:0 0 10px;max-width:660px;\">{{ impact.headline }}</h1>\n          <p style=\"font-size:13.5px;color:#6B7167;margin:0 0 26px;line-height:1.5;max-width:560px;\">{{ impact.triggerSub }}</p>\n\n          <div style=\"display:flex;gap:9px;margin-bottom:30px;\">\n            <div style=\"display:flex;align-items:center;gap:7px;padding:7px 13px;background:rgba(224,83,63,0.1);border:1px solid rgba(224,83,63,0.22);border-radius:10px;\"><span style=\"font-family:'Geist Mono',monospace;font-size:16px;font-weight:600;color:#E0533F;\">{{ impact.cConflict }}</span><span style=\"font-size:11.5px;color:#a13322;line-height:1.2;\">now in<br>conflict</span></div>\n            <div style=\"display:flex;align-items:center;gap:7px;padding:7px 13px;background:rgba(216,149,31,0.1);border:1px solid rgba(216,149,31,0.22);border-radius:10px;\"><span style=\"font-family:'Geist Mono',monospace;font-size:16px;font-weight:600;color:#D8951F;\">{{ impact.cWeak }}</span><span style=\"font-size:11.5px;color:#946700;line-height:1.2;\">weakened</span></div>\n            <div style=\"display:flex;align-items:center;gap:7px;padding:7px 13px;background:rgba(95,158,46,0.1);border:1px solid rgba(95,158,46,0.22);border-radius:10px;\"><span style=\"font-family:'Geist Mono',monospace;font-size:16px;font-weight:600;color:#5F9E2E;\">{{ impact.cBetter }}</span><span style=\"font-size:11.5px;color:#3a6b14;line-height:1.2;\">newly<br>supported</span></div>\n          </div>\n\n          <!-- HERO FLIP -->\n          <div style=\"background:rgba(255,255,255,0.62);backdrop-filter:{{ glassBlur }};-webkit-backdrop-filter:{{ glassBlur }};border:1px solid rgba(26,29,23,0.1);border-radius:20px;padding:26px 26px 24px;box-shadow:0 24px 60px -28px rgba(26,29,23,0.3),inset 0 1px 0 rgba(255,255,255,0.7);\">\n            <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:16px;\">\n              <span style=\"font-family:'Geist Mono',monospace;font-size:11px;font-weight:600;color:#fff;background:#1A1D17;padding:3px 8px;border-radius:6px;\">{{ impact.hero.id }}</span>\n              <span style=\"font-family:'Geist Mono',monospace;font-size:11px;color:#9AA0A6;\">{{ impact.hero.src }}</span>\n            </div>\n            <div style=\"font-size:23px;font-weight:600;line-height:1.3;letter-spacing:-0.01em;margin-bottom:20px;max-width:640px;\">{{ impact.hero.text }}</div>\n\n            <div style=\"display:inline-flex;align-items:center;gap:13px;padding:8px 14px;background:rgba(26,29,23,0.035);border-radius:11px;margin-bottom:26px;\">\n              <span style=\"display:flex;align-items:center;gap:7px;font-size:13px;font-weight:600;color:{{ impact.hero.fromColor }};opacity:0.65;\"><span style=\"font-size:11px;\">{{ impact.hero.fromGlyph }}</span><span style=\"text-decoration:line-through;text-decoration-color:rgba(26,29,23,0.3);\">{{ impact.hero.fromLabel }}</span></span>\n              <span style=\"color:#9AA0A6;font-size:15px;\">\u2192</span>\n              <span style=\"display:flex;align-items:center;gap:7px;font-size:13px;font-weight:700;color:#E0533F;\"><span style=\"width:20px;height:20px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;background:repeating-linear-gradient(135deg,#E0533F 0 3px,#5F9E2E 3px 6px);box-shadow:0 0 0 1.5px #E0533F;\">\u25b2</span>{{ impact.hero.toLabel }}</span>\n            </div>\n\n            <div style=\"display:grid;grid-template-columns:1fr 1.1fr;gap:16px;align-items:stretch;\">\n              <div style=\"border:1px solid rgba(95,158,46,0.25);border-radius:14px;padding:16px;background:rgba(95,158,46,0.05);\">\n                <div style=\"font-size:12px;font-weight:700;color:#3a6b14;margin-bottom:13px;\">What held it up</div>\n                <sc-for list=\"{{ impact.hero.support }}\" as=\"ev\" hint-placeholder-count=\"2\">\n                  <div style=\"margin-bottom:14px;\">\n                    <div style=\"display:flex;align-items:center;gap:7px;margin-bottom:5px;\">\n                      <span style=\"font-family:'Geist Mono',monospace;font-size:8.5px;font-weight:600;color:#fff;background:#5F9E2E;height:16px;padding:0 5px;border-radius:4px;display:flex;align-items:center;\">{{ ev.tag }}</span>\n                      <span style=\"font-size:11px;font-weight:600;color:#3a3f35;\">{{ ev.doc }}</span>\n                      <span style=\"font-family:'Geist Mono',monospace;font-size:9px;color:#9AA0A6;\">{{ ev.ref }}</span>\n                    </div>\n                    <div style=\"font-size:12px;color:#2f3a26;line-height:1.5;\">\u201c{{ ev.quote }}\u201d</div>\n                  </div>\n                </sc-for>\n              </div>\n              <div style=\"border:1px solid rgba(224,83,63,0.32);border-radius:14px;padding:18px;background:rgba(224,83,63,0.07);display:flex;flex-direction:column;\">\n                <div style=\"font-size:12px;font-weight:700;color:#a13322;margin-bottom:13px;\">What your new document says</div>\n                <div style=\"display:flex;align-items:center;gap:7px;margin-bottom:11px;\">\n                  <span style=\"font-family:'Geist Mono',monospace;font-size:8.5px;font-weight:600;color:#fff;background:#E0533F;height:16px;padding:0 5px;border-radius:4px;display:flex;align-items:center;\">{{ impact.hero.cause.tag }}</span>\n                  <span style=\"font-size:11px;font-weight:600;color:#3a3f35;\">{{ impact.hero.cause.doc }}</span>\n                  <span style=\"font-family:'Geist Mono',monospace;font-size:9px;color:#9AA0A6;\">{{ impact.hero.cause.ref }}</span>\n                </div>\n                <div style=\"font-size:18px;font-weight:500;color:#7a2418;line-height:1.42;flex:1;\">\u201c{{ impact.hero.cause.quote }}\u201d</div>\n                <button onclick=\"{{ impact.hero.cause.view }}\" style=\"margin-top:14px;align-self:flex-start;display:inline-flex;align-items:center;gap:5px;height:30px;padding:0 13px;background:rgba(255,255,255,0.8);border:1px solid rgba(224,83,63,0.3);border-radius:8px;font-size:11.5px;font-weight:600;color:#a13322;\" style-hover=\"background:#fff\">View source \u2192</button>\n              </div>\n            </div>\n\n            <div style=\"margin-top:20px;padding:14px 16px;background:rgba(26,29,23,0.04);border-radius:12px;font-size:14px;color:#3a3f35;line-height:1.5;\">{{ impact.hero.why }}</div>\n\n            <div style=\"display:flex;gap:10px;margin-top:20px;\">\n              <button onclick=\"{{ impact.hero.open }}\" style=\"height:40px;padding:0 18px;background:#1A1D17;color:#F5F7EF;border:none;border-radius:10px;font-size:13px;font-weight:600;\" style-hover=\"background:#2c3026\">Open {{ impact.hero.id }} in detail \u2192</button>\n            </div>\n          </div>\n\n          <!-- SECONDARY MOVES -->\n          <div style=\"margin-top:34px;\">\n            <h2 style=\"font-size:14px;font-weight:700;margin:0 0 14px;color:#3a3f35;\">The document moved two other points</h2>\n            <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px;\">\n              <sc-for list=\"{{ impact.others }}\" as=\"o\" hint-placeholder-count=\"2\">\n                <div onclick=\"{{ o.open }}\" style=\"background:rgba(255,255,255,0.55);border:1px solid rgba(26,29,23,0.1);border-radius:15px;padding:17px;cursor:pointer;transition:box-shadow .25s,transform .25s;box-shadow:inset 0 1px 0 rgba(255,255,255,0.6);\" style-hover=\"box-shadow:0 12px 30px -16px rgba(26,29,23,0.22);transform:translateY(-1px)\">\n                  <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:11px;\">\n                    <span style=\"font-size:10.5px;font-weight:700;color:{{ o.kindColor }};background:{{ o.kindBg }};padding:3px 9px;border-radius:20px;\">{{ o.kindLabel }}</span>\n                    <span style=\"font-family:'Geist Mono',monospace;font-size:10px;color:#9AA0A6;\">{{ o.id }}</span>\n                  </div>\n                  <div style=\"font-size:13.5px;color:#1A1D17;line-height:1.4;font-weight:500;margin-bottom:12px;\">{{ o.text }}</div>\n                  <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:12px;font-size:11.5px;\">\n                    <span style=\"display:flex;align-items:center;gap:5px;color:{{ o.fromColor }};opacity:0.7;\"><span style=\"font-size:9px;\">{{ o.fromGlyph }}</span>{{ o.fromLabel }}</span>\n                    <span style=\"color:#c8ccc2;\">\u2192</span>\n                    <span style=\"display:flex;align-items:center;gap:5px;color:{{ o.toColor }};font-weight:600;\"><span style=\"font-size:9px;\">{{ o.toGlyph }}</span>{{ o.toLabel }}</span>\n                  </div>\n                  <div style=\"padding:10px 12px;background:rgba(26,29,23,0.03);border-radius:9px;\">\n                    <div style=\"font-size:11.5px;color:#2f3a26;line-height:1.45;\">\u201c{{ o.causeQuote }}\u201d</div>\n                    <div style=\"font-family:'Geist Mono',monospace;font-size:9px;color:#9AA0A6;margin-top:4px;\">{{ o.causeCite }}</div>\n                  </div>\n                </div>\n              </sc-for>\n            </div>\n          </div>\n\n          <div style=\"display:flex;gap:10px;margin-top:34px;align-items:center;\">\n            <button onclick=\"{{ impact.reviewDone }}\" style=\"height:40px;padding:0 18px;background:{{ accent }};border:1px solid rgba(91,138,28,0.5);border-radius:10px;font-size:13px;font-weight:600;color:#2c3d10;box-shadow:inset 0 1px 0 rgba(255,255,255,0.7);\">Mark reviewed</button>\n            <button onclick=\"{{ impact.goTriage }}\" style=\"height:40px;padding:0 16px;background:transparent;border:1px solid rgba(26,29,23,0.16);border-radius:10px;font-size:13px;color:#3a3f35;\">Review in triage</button>\n            <span style=\"font-size:11.5px;color:#9AA0A6;margin-left:4px;\">Until reviewed, changed rows stay flagged in Triage.</span>\n          </div>\n        </div>\n      </sc-if>\n\n      <!-- ===== ISSUE MAP ===== -->\n      <sc-if value=\"{{ isMap }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"padding:34px 40px 80px;max-width:1000px;\">\n          <h1 style=\"font-size:21px;font-weight:700;letter-spacing:-0.02em;margin:0 0 6px;\">Issue Map</h1>\n          <p style=\"font-size:13px;color:#9AA0A6;margin:0 0 30px;\">Where is this case soft? The ten-second read.</p>\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:16px;\">\n            <sc-for list=\"{{ mapCards }}\" as=\"c\" hint-placeholder-count=\"3\">\n              <div onclick=\"{{ c.open }}\" style=\"background:rgba(255,255,255,0.6);border:1px solid rgba(26,29,23,0.11);border-radius:17px;padding:19px;cursor:pointer;transition:box-shadow .25s,transform .25s;box-shadow:inset 0 1px 0 rgba(255,255,255,0.6);\" style-hover=\"box-shadow:0 16px 38px -18px rgba(26,29,23,0.26);transform:translateY(-2px)\">\n                <div style=\"display:flex;gap:15px;align-items:flex-start;\">\n                  <div style=\"width:74px;height:74px;flex:0 0 auto;border-radius:50%;background:{{ c.donut }};display:flex;align-items:center;justify-content:center;\">\n                    <div style=\"width:48px;height:48px;border-radius:50%;background:#F8FAF2;display:flex;align-items:center;justify-content:center;font-family:'Geist Mono',monospace;font-size:15px;font-weight:600;color:#1A1D17;\">{{ c.total }}</div>\n                  </div>\n                  <div style=\"flex:1;min-width:0;\">\n                    <h3 style=\"font-size:14.5px;font-weight:700;margin:0 0 8px;line-height:1.3;\">{{ c.title }}</h3>\n                    <div style=\"display:flex;flex-wrap:wrap;gap:7px;\">\n                      <sc-for list=\"{{ c.counts }}\" as=\"k\" hint-placeholder-count=\"3\">\n                        <span style=\"display:flex;align-items:center;gap:4px;font-size:11px;color:#3a3f35;\"><span style=\"color:{{ k.color }};font-size:9px;\">{{ k.glyph }}</span><span style=\"font-family:'Geist Mono',monospace;font-weight:600;\">{{ k.n }}</span></span>\n                      </sc-for>\n                    </div>\n                  </div>\n                </div>\n                <div style=\"margin-top:15px;padding-top:13px;border-top:1px solid rgba(26,29,23,0.08);display:flex;align-items:center;gap:8px;\">\n                  <span style=\"font-size:10.5px;color:#9AA0A6;\">Weakest link</span>\n                  <span style=\"font-size:11.5px;color:{{ c.worstColor }};font-weight:600;\">{{ c.worst }}</span>\n                </div>\n              </div>\n            </sc-for>\n          </div>\n        </div>\n      </sc-if>\n\n      <!-- ===== MATRIX ===== -->\n      <sc-if value=\"{{ isMatrix }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"padding:34px 40px 80px;max-width:1000px;\">\n          <div style=\"display:flex;align-items:center;margin-bottom:22px;\">\n            <div style=\"flex:1;\">\n              <h1 style=\"font-size:21px;font-weight:700;letter-spacing:-0.02em;margin:0 0 6px;\">Matrix</h1>\n              <p style=\"font-size:13px;color:#9AA0A6;margin:0;\">Completeness at a glance. A conflict reads as two lit cells on one row.</p>\n            </div>\n            <button onclick=\"{{ exportReport }}\" style=\"height:36px;padding:0 15px;background:rgba(26,29,23,0.9);color:#F5F7EF;border:none;border-radius:9px;font-size:12px;font-weight:600;\" style-hover=\"background:#2c3026\">Export report</button>\n          </div>\n          <div style=\"border:1px solid rgba(26,29,23,0.1);border-radius:15px;overflow:hidden;background:rgba(255,255,255,0.5);box-shadow:inset 0 1px 0 rgba(255,255,255,0.6);\">\n            <div style=\"display:grid;grid-template-columns:1fr 92px 92px 92px 92px;background:rgba(26,29,23,0.035);border-bottom:1px solid rgba(26,29,23,0.08);\">\n              <div style=\"padding:12px 16px;font-size:11px;font-weight:600;color:#6B7167;\">Proposition</div>\n              <div style=\"padding:12px 8px;font-size:11px;font-weight:600;color:#5F9E2E;text-align:center;\">Supported</div>\n              <div style=\"padding:12px 8px;font-size:11px;font-weight:600;color:#946700;text-align:center;\">Partial</div>\n              <div style=\"padding:12px 8px;font-size:11px;font-weight:600;color:#a13322;text-align:center;\">Against</div>\n              <div style=\"padding:12px 8px;font-size:11px;font-weight:600;color:#9AA0A6;text-align:center;\">Blind spot</div>\n            </div>\n            <sc-for list=\"{{ matrix }}\" as=\"grp\" hint-placeholder-count=\"3\">\n              <div>\n                <div style=\"padding:9px 16px;font-size:10.5px;font-family:'Geist Mono',monospace;color:#9AA0A6;background:rgba(26,29,23,0.02);\">{{ grp.title }}</div>\n                <sc-for list=\"{{ grp.rows }}\" as=\"r\" hint-placeholder-count=\"3\">\n                  <div onclick=\"{{ r.open }}\" style=\"display:grid;grid-template-columns:1fr 92px 92px 92px 92px;border-top:1px solid rgba(26,29,23,0.06);cursor:pointer;align-items:center;transition:background .15s;\" style-hover=\"background:rgba(199,232,112,0.08)\">\n                    <div style=\"padding:13px 16px;font-size:13px;color:#1A1D17;display:flex;align-items:center;gap:9px;line-height:1.3;\"><span style=\"font-family:'Geist Mono',monospace;font-size:10px;color:#9AA0A6;flex:0 0 auto;\">{{ r.id }}</span>{{ r.text }}</div>\n                    <div style=\"text-align:center;\"><span style=\"display:inline-flex;align-items:center;justify-content:center;min-width:24px;height:24px;border-radius:7px;font-family:'Geist Mono',monospace;font-size:12px;font-weight:600;background:{{ r.supBg }};color:{{ r.supColor }};\">{{ r.sup }}</span></div>\n                    <div style=\"text-align:center;\"><span style=\"display:inline-flex;align-items:center;justify-content:center;min-width:24px;height:24px;border-radius:7px;font-family:'Geist Mono',monospace;font-size:12px;font-weight:600;background:{{ r.parBg }};color:{{ r.parColor }};\">{{ r.par }}</span></div>\n                    <div style=\"text-align:center;\"><span style=\"display:inline-flex;align-items:center;justify-content:center;min-width:24px;height:24px;border-radius:7px;font-family:'Geist Mono',monospace;font-size:12px;font-weight:600;background:{{ r.conBg }};color:{{ r.conColor }};\">{{ r.con }}</span></div>\n                    <div style=\"text-align:center;\"><span style=\"display:inline-flex;align-items:center;justify-content:center;min-width:24px;height:24px;border-radius:7px;font-size:12px;color:{{ r.naColor }};\">{{ r.na }}</span></div>\n                  </div>\n                </sc-for>\n              </div>\n            </sc-for>\n          </div>\n        </div>\n      </sc-if>\n    </div>\n  </div>\n\n  <!-- ============ DIMMER ============ -->\n  <sc-if value=\"{{ drawerOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ closeDrawer }}\" style=\"position:fixed;inset:0;background:rgba(26,29,23,0.28);backdrop-filter:blur(1.5px);z-index:45;\"></div>\n  </sc-if>\n\n  <!-- ============ DETAIL DRAWER ============ -->\n  <sc-if value=\"{{ drawerOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed;top:0;right:0;bottom:0;width:564px;max-width:92vw;background:rgba(248,250,242,0.86);backdrop-filter:{{ glassBlur }};-webkit-backdrop-filter:{{ glassBlur }};border-left:1px solid rgba(26,29,23,0.12);box-shadow:-20px 0 60px -18px rgba(26,29,23,0.35),inset 1px 0 0 rgba(255,255,255,0.5);z-index:50;display:flex;flex-direction:column;animation:cp-drawer .34s cubic-bezier(0.22,1,0.36,1);\">\n      <div style=\"padding:20px 22px 16px;border-bottom:1px solid rgba(26,29,23,0.09);\">\n        <div style=\"display:flex;align-items:flex-start;gap:12px;\">\n          <sc-if value=\"{{ drawer.isConflict }}\" hint-placeholder-val=\"{{ false }}\">\n            <span style=\"width:32px;height:32px;flex:0 0 auto;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;background:repeating-linear-gradient(135deg,#E0533F 0 4px,#5F9E2E 4px 8px);box-shadow:0 0 0 1.5px #E0533F;\">\u25b2</span>\n          </sc-if>\n          <sc-if value=\"{{ drawer.notConflict }}\" hint-placeholder-val=\"{{ true }}\">\n            <span style=\"width:32px;height:32px;flex:0 0 auto;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;background:{{ drawer.glyphBg }};color:{{ drawer.statusColor }};\">{{ drawer.statusGlyph }}</span>\n          </sc-if>\n          <div style=\"flex:1;min-width:0;\">\n            <div style=\"font-size:11px;font-weight:600;color:{{ drawer.statusColor }};\">{{ drawer.statusLabel }}</div>\n            <div style=\"font-family:'Geist Mono',monospace;font-size:10.5px;color:#9AA0A6;margin-top:2px;\">{{ drawer.id }} \u00b7 {{ drawer.srcChip }}</div>\n          </div>\n          <button onclick=\"{{ closeDrawer }}\" style=\"width:30px;height:30px;flex:0 0 auto;border:1px solid rgba(26,29,23,0.12);background:rgba(255,255,255,0.6);border-radius:8px;color:#6B7167;font-size:15px;line-height:1;\">\u00d7</button>\n        </div>\n        <div style=\"font-size:17.5px;font-weight:600;line-height:1.35;margin-top:14px;letter-spacing:-0.01em;\">{{ drawer.text }}</div>\n        <sc-if value=\"{{ drawer.challenged }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"margin-top:11px;padding:9px 12px;background:rgba(216,149,31,0.13);border:1px solid rgba(216,149,31,0.3);border-radius:9px;font-size:12px;color:#7a5300;line-height:1.4;\">\u26a0 <strong style=\"font-weight:600;\">New evidence challenges your call.</strong> You overrode this to {{ drawer.overrideStatus }}; a re-run found evidence that disagrees. Nothing was reverted \u2014 reconcile when ready.</div>\n        </sc-if>\n      </div>\n\n      <div style=\"flex:1;overflow-y:auto;padding:18px 22px 40px;\">\n        <div style=\"background:rgba(255,255,255,0.5);border:1px solid rgba(26,29,23,0.09);border-radius:13px;padding:14px 15px;margin-bottom:18px;\">\n          <div style=\"display:flex;align-items:center;gap:7px;margin-bottom:7px;\">\n            <span style=\"font-size:12px;\">\u26a0</span>\n            <span style=\"font-size:12px;font-weight:600;color:#1A1D17;\">Stress test</span>\n            <span style=\"font-family:'Geist Mono',monospace;font-size:10px;color:#9AA0A6;margin-left:auto;\">{{ drawer.fragScore }}</span>\n          </div>\n          <div style=\"font-size:12.5px;color:#3a3f35;line-height:1.5;\">{{ drawer.fragNote }}</div>\n          <sc-if value=\"{{ drawer.hasLoadBearing }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"margin-top:12px;padding-top:11px;border-top:1px dashed rgba(26,29,23,0.12);\">\n              <div style=\"font-size:10.5px;color:#9AA0A6;margin-bottom:8px;\">What if I lose a load-bearing source? Toggle to preview.</div>\n              <div style=\"display:flex;flex-direction:column;gap:6px;\">\n                <sc-for list=\"{{ drawer.loadBearing }}\" as=\"lb\" hint-placeholder-count=\"2\">\n                  <button onclick=\"{{ lb.toggle }}\" style=\"display:flex;align-items:center;gap:9px;padding:7px 9px;border:1px solid {{ lb.border }};background:{{ lb.bg }};border-radius:8px;text-align:left;\">\n                    <span style=\"width:15px;height:15px;border-radius:4px;border:1.5px solid {{ lb.boxBorder }};background:{{ lb.boxBg }};flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;\">{{ lb.check }}</span>\n                    <span style=\"font-size:11.5px;color:{{ lb.textColor }};text-decoration:{{ lb.strike }};flex:1;\">{{ lb.label }}</span>\n                  </button>\n                </sc-for>\n              </div>\n              <sc-if value=\"{{ drawer.showPreview }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"margin-top:9px;font-size:12px;color:#3a3f35;display:flex;align-items:center;gap:7px;\">Preview: status \u2192<span style=\"font-weight:600;color:{{ drawer.previewColor }};\">{{ drawer.previewLabel }}</span></div>\n              </sc-if>\n            </div>\n          </sc-if>\n        </div>\n\n        <div style=\"font-size:11px;color:#9AA0A6;margin-bottom:9px;\">Support structure</div>\n        <div style=\"background:radi v style=\"border-top:1px solid rgba(26,29,23,0.1);padding:13px 22px;background:rgba(247,249,240,0.6);display:flex;flex-direction:column;gap:10px;\">\n        <sc-if value=\"{{ drawer.overrideOpen }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:flex;flex-direction:column;gap:8px;\">\n            <div style=\"display:flex;gap:6px;flex-wrap:wrap;\">\n              <sc-for list=\"{{ drawer.overrideChoices }}\" as=\"oc\" hint-placeholder-count=\"4\">\n                <button onclick=\"{{ oc.pick }}\" style=\"display:flex;align-items:center;gap:5px;height:30px;padding:0 11px;border:1px solid {{ oc.border }};background:{{ oc.bg }};border-radius:7px;font-size:11.5px;color:{{ oc.color }};\"><span style=\"color:{{ oc.dot }};font-size:9px;\">{{ oc.glyph }}</span>{{ oc.label }}</button>\n              </sc-for>\n            </div>\n            <input value=\"{{ drawer.reason }}\" oninput=\"{{ setReason }}\" placeholder=\"Reason (optional) \u2014 stored on the record\" style=\"height:34px;padding:0 11px;border:1px solid rgba(26,29,23,0.14);border-radius:8px;background:#fff;font-size:12px;outline:none;\">\n          </div>\n        </sc-if>\n        <div style=\"display:flex;gap:9px;align-items:center;\">\n          <button onclick=\"{{ confirmProp }}\" style=\"flex:1;height:38px;border:1px solid {{ drawer.confirmBorder }};background:{{ drawer.confirmBg }};border-radius:9px;font-size:12.5px;font-weight:600;color:{{ drawer.confirmColor }};display:flex;align-items:center;justify-content:center;gap:6px;\">{{ drawer.confirmLabel }}</button>\n          <button onclick=\"{{ toggleOverride }}\" style=\"flex:1;height:38px;border:1px solid rgba(26,29,23,0.16);background:rgba(255,255,255,0.7);border-radius:9px;font-size:12.5px;font-weight:600;color:#3a3f35;\">Override status</button>\n          <button onclick=\"{{ toggleFollow }}\" title=\"Flag for follow-up\" style=\"width:38px;height:38px;flex:0 0 auto;border:1px solid {{ drawer.flagBorder }};background:{{ drawer.flagBg }};border-radius:9px;font-size:14px;color:{{ drawer.flagColor }};\">\u2691</button>\n        </div>\n        <div style=\"font-size:10.5px;color:#9AA0A6;text-align:center;line-height:1.4;\">The tool proposes; you dispose. An override is sticky \u2014 a later re-run flags disagreement rather than reverting it.</div>\n      </div>\n    </div>\n  </sc-if>\n\n  <!-- ============ SOURCE READER ============ -->\n  <sc-if value=\"{{ readerOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ closeReader }}\" style=\"position:fixed;inset:0;background:rgba(26,29,23,0.22);z-index:55;\"></div>\n    <div style=\"position:fixed;top:0;right:0;bottom:0;width:600px;max-width:94vw;background:rgba(250,251,245,0.92);backdrop-filter:{{ glassBlur }};-webkit-backdrop-filter:{{ glassBlur }};border-left:1px solid rgba(26,29,23,0.14);box-shadow:-24px 0 70px -20px rgba(26,29,23,0.4),inset 1px 0 0 rgba(255,255,255,0.55);z-index:56;display:flex;flex-direction:column;animation:cp-drawer .3s cubic-bezier(0.22,1,0.36,1);\">\n      <div style=\"padding:18px 22px;border-bottom:1px solid rgba(26,29,23,0.1);display:flex;align-items:center;gap:12px;\">\n        <div style=\"flex:1;min-width:0;\">\n          <div style=\"font-size:13.5px;font-weight:700;\">{{ reader.doc }}</div>\n          <div style=\"font-family:'Geist Mono',monospace;font-size:10.5px;color:#9AA0A6;margin-top:2px;\">{{ reader.citation }}</div>\n        </div>\n        <div style=\"display:flex;align-items:center;gap:4px;\">\n          <button onclick=\"{{ reader.prev }}\" style=\"width:30px;height:30px;border:1px solid rgba(26,29,23,0.12);background:{{ reader.prevBg }};border-radius:8px;color:#6B7167;font-size:13px;\">\u2039</button>\n          <span style=\"font-family:'Geist Mono',monospace;font-size:10px;color:#9AA0A6;min-width:34px;text-align:center;\">{{ reader.pos }}</span>\n          <button onclick=\"{{ reader.next }}\" style=\"width:30px;height:30px;border:1px solid rgba(26,29,23,0.12);background: e&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Identity&quot;},&quot;density&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;comfortable&quot;,&quot;compact&quot;],&quot;default&quot;:&quot;comfortable&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Layout&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    view:'triage', snap:'before', drawer:null, reader:null, readerIdx:0,\n    hoverProp:null, processing:false, dropActive:false, acknowledged:false,\n    showFilters:false, search:'', statusFilter:[], changedOnly:false, snapOpen:false,\n    whatIf:{}, confirmed:{}, overrides:{}, overrideOpen:false, follow:{},\n    props:[], loaded:false, loadMsg:'Loading latest analysis...',\n  };\n\n  SM = {\n    supported:{c:'#5F9E2E',g:'\\u25CF',l:'Supported'},\n    somewhat_supported:{c:'#87A330',g:'\\u25D5',l:'Somewhat supported'},\n    neutral:{c:'#7A8290',g:'\\u25D0',l:'Neutral'},\n    not_addressed:{c:'#9AA0A6',g:'\\u25CB',l:'Not addressed'},\n    somewhat_adverse:{c:'#D8951F',g:'\\u25D4',l:'Somewhat adverse'},\n    adverse:{c:'#E0533F',g:'\\u2715',l:'Adverse'},\n  };\n  ET = {\n    witness_fact:{t:'WF',l:'Witness \\u00B7 fact'}, witness_expert:{t:'WE',l:'Witness \\u00B7 expert'},\n    contract:{t:'CT',l:'Contract'}, correspondence:{t:'CO',l:'Correspondence'},\n    internal_record:{t:'IR',l:'Internal record'}, record:{t:'RC',l:'Record'},\n  };\n  RANK = {adverse:0, somewhat_adverse:1, neutral:2, not_addressed:3, somewhat_supported:4, supported:5};\n  ISSUES = [];\n  DIFFINFO = {\n    trigger:{ doc:'Internal Defect Log', sub:\"The new document is the defendant\\u2019s disclosure \\u2014 your own internal record. It was re-tested against every pleaded proposition.\", time:'24 Jun' },\n    changes:[\n      { prop:'P03', from:'supported', to:'somewhat_adverse', kind:'flip', dir:'worse', causeEvId:'E13', why:'Your pleaded case says the platform was substantially free from defects at go-live. Your own defect log says 4     ];\n  }\n\n  getReader(){\n    if(!this.state.reader) return null;\n    const p=this.getProps(this.state.snap).find(x=>x.id===this.state.reader);\n    if(!p) return null;\n    const list=p.ev.filter(e=>e.url);\n    const idx=Math.min(this.state.readerIdx, list.length-1);\n    const e=list[idx];\n    if(!e) return null;\n    return { doc:e.doc, citation:e.doc+' \\u00B7 '+e.ref, lines:this.getDocLines(e),\n      pos:(idx+1)+' / '+list.length,\n      prevBg: idx>0?'rgba(255,255,255,0.6)':'rgba(26,29,23,0.03)',\n      nextBg: idx<list.length-1?'rgba(255,255,255,0.6)':'rgba(26,29,23,0.03)',\n      prev:()=>{ if(idx>0) this.setState({readerIdx:idx-1}); },\n      next:()=>{ if(idx<list.length-1) this.setState({readerIdx:idx+1}); } };\n  }\n  openReaderFor(propId, evId){\n    const p=this.getProps(this.state.snap).find(x=>x.id===propId);\n    const list=p.ev.filter(e=>e.url);\n    const i=Math.max(0, list.findIndex(e=>e.id===evId));\n    this.setState({reader:propId, readerIdx:i});\n  }\n\n  toggleWhatIf(pid, eid){\n    const w={...this.state.whatIf}; const cur=w[pid]?[...w[pid]]:[];\n    const i=cur.indexOf(eid); if(i>=0) cur.splice(i,1); else cur.push(eid);\n    w[pid]=cur; this.setState({whatIf:w});\n  }\n  applyOverride(pid, status){\n    const o={...this.state.overrides}; const prevReason=(o[pid]&&o[pid].reason)||'';\n    o[pid]={status, reason:prevReason}; this.setState({overrides:o});\n  }\n  setReason(e){ const v=e.target.value; const o={...this.state.overrides}; const pid=this.state.drawer;\n    if(!o[pid]) o[pid]={status:this.SM_default(pid), reason:v}; else o[pid]={...o[pid], reason:v};\n    this.setState({overrides:o}); }\n  SM_default(pid){ const p=this.getProps(this.state.snap).find(x=>x.id===pid); return p?p.status:'supported'; }\n  confirmProp(){ const c={...this.state.confirmed}; const pid=this.state.drawer; c[pid]=!c[pid]; this.setState({confirmed:c}); }\n  toggleFollow(){ const f={...this.state.follow}; const pid=this.state.drawer; f[pid]=!f[pid]; this.setState({follow:f}); }\n  toggleOverride(){ this.setState({overrideOpen:!this.state.overrideOpen}); }\n\n  startDiff(){\n    // run-to-run diff is deferred; ignore the demo drop-to-retest gesture\n    this.setState({dropActive:false});\n  }\n  onDragOver(e){ e.preventDefault(); if(!this.state.dropActive && this.state.snap==='before') this.setState({dropActive:true}); }\n  onDragLeave(e){ e.preventDefault(); if(e.currentTarget===e.target) this.setState({dropActive:false}); }\n  onDrop(e){ e.preventDefault(); this.startDiff(); }\n  chooseSnap(which){\n    this.setState({snap:'before', view:'triage', snapOpen:false, drawer:null, acknowledged:false});\n  }\n\n  renderVals(){\n    const s=this.state;\n    const accent=this.props.accent ?? '#C7E870';\n    const glassBlur=(this.props.glass ?? true) ? 'blur(22px) saturate(1.6)' : 'saturate(1.02)';\n    const showGrain=this.props.texture ?? true;\n    const rowPad=(this.props.density ?? 'comfortable')==='compact' ? '11px' : '17px';\n    const after=s.snap==='after';\n    const ev = (s.view==='impact' && !after) ? 'triage' : s.view;\n    const all=this.getProps(s.snap);\n    const caseH=this.health(all);\n    const conflicts=all.filter(p=>{const c=this.counts(p);return c.f>0&&c.a>0;}).length;\n\n    const tab=(key,label,icon,count)=>{ const on=ev===key; return {\n      label, icon, count, go:()=>this.setState({view:key}),\n      bg:on?'rgba(199,232,112,0.32)':'transparent', border:on?'rgba(91,138,28,0.3)':'transparent',\n      hoverBg:on?'rgba(199,232,112,0.32)':'rgba(26,29,23,0.04)',\n      color:on?'#2c3d10':'#3a3f35', weight:on?'600':'500',\n      iconBg:on?accent:'rgba(26,29,23,0.06)', iconColor:on?'#2c3d10':'#6B7167', countColor:'#9AA0A6' };};\n    let tabs=[tab('triage','Triage','\\u25A4',String((this.state.props||[]).length)), tab('map','Issue Map','\\u25A6',String((this.ISSUES||[]).length)), tab('matrix','Matrix','\\u25A4',String((this.state.props||[]).length))];\n    if(after){\n      const on=ev==='impact';\n      tabs=[{ label:'What changed', icon:'\\u26A1', count:'3', go:()=>this.setState({view:'impact'}),\n        bg:on?'rgba(224,83,63,0.12)':'rgba(224,83,63,0.05)', border:'rgba(224,83,63,0.28)', hoverBg:'rgba(224,83,63,0.12)',\n        color:'#a13322', weight:'600', iconBg:on?'#E0533F':'rgba(224,83,63,0.18)', iconColor:on?'#fff':'#a13322', countColor:'#cf7a6c' }, ...tabs];\n    }\n\n    const statusChips=[['adverse','Adverse'],['somewhat_adverse','Somewhat adverse'],['neutral','Neutral'],['not_addressed','Blind spot'],['somewhat_supported','Somewhat supported'],['supported','Supported']].map(([k,l])=>{\n      const on=s.statusFilter.includes(k); const m=this.SM[k];\n      return { label:l, glyph:m.g, dot:m.c, toggle:()=>{ const f=on?s.statusFilter.filter(x=>x!==k):[...s.statusFilter,k]; this.setState({statusFilter:f}); },\n        bg:on?(m.c+'18'):'rgba(255,255,255,0.5)', border:on?m.c:'rgba(26,29,23,0.12)', color:on?m.c:'#3a3f35' };});\n    const drawer=this.buildDrawer();\n    const reader=this.getReader();\n    const snaps=[\n      {key:'before', label:'Before disclosure', time:'20 Jun', dot:'#9AA0A6', note:'Defendant disclosure not yet received.'},\n      {key:'after', label:'After Internal Defect Log', time:'24 Jun', dot:'#E0533F', note:'1 conflict \\u00B7 1 weakened \\u00B7 1 newly supported.'},\n    ].map(sn=>({ ...sn, bg:s.snap===sn.key?'rgba(199,232,112,0.28)':'transparent', choose:()=>this.chooseSnap(sn.key) }));\n    const curSnap=after?snaps[1]:snaps[0];\n\n    return {\n      accent, glassBlur, showGrain, rowPad, glassOn:(this.props.glass ?? true),\n      spotRef:this.spotRef, ringRef:this.ringRef, dropRef:this.dropRef,\n      dropMove:e=>this.dropMove(e), dropLeave:()=>this.dropLeave(),\n      isTriage:ev==='triage', isImpact:ev==='impact', isMap:ev==='map', isMatrix:ev==='matrix',\n      issues:this.buildIssues(), noResults: this.buildIssues().length===0,\n      impact:this.buildImpact(), mapCards:this.buildMap(), matrix:this.buildMatrix(),\n      tabs, s
