<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>propCheck — proposition evidence analysis</title>
    <style>
      :root {
        --bg: #0f1115;
        --panel: #181b22;
        --border: #2a2f3a;
        --text: #e6e8ec;
        --muted: #9aa3b2;
        --accent: #5b8cff;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font: 15px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      header {
        padding: 24px 32px;
        border-bottom: 1px solid var(--border);
      }
      header h1 { margin: 0; font-size: 20px; }
      header p { margin: 4px 0 0; color: var(--muted); font-size: 13px; }
      main { max-width: 920px; margin: 0 auto; padding: 28px 24px 80px; }
      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 22px;
      }
      label { display: block; font-weight: 600; margin-bottom: 6px; }
      .hint { color: var(--muted); font-size: 13px; font-weight: 400; }
      input[type="file"] {
        width: 100%;
        padding: 14px;
        background: #11141a;
        border: 1px dashed var(--border);
        border-radius: 8px;
        color: var(--text);
      }
      textarea {
        width: 100%;
        min-height: 140px;
        margin-top: 4px;
        padding: 12px;
        background: #11141a;
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--text);
        font: 13px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace;
        resize: vertical;
      }
      button {
        margin-top: 16px;
        padding: 11px 20px;
        background: var(--accent);
        color: #fff;
        border: 0;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
      }
      button:disabled { opacity: 0.5; cursor: default; }
      .field { margin-bottom: 18px; }
      #statusLine { color: var(--muted); font-size: 14px; margin: 6px 0 14px; }
      .pill {
        display: inline-block;
        padding: 2px 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 600;
        text-transform: capitalize;
      }
      .bar {
        height: 8px;
        background: #11141a;
        border-radius: 999px;
        overflow: hidden;
        margin: 10px 0 18px;
      }
      .bar > span { display: block; height: 100%; background: var(--accent); width: 0; transition: width .4s; }
      .card {
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 14px 16px;
        margin-bottom: 12px;
        background: #14171e;
      }
      .card h3 { margin: 0 0 4px; font-size: 14px; }
      .card .summary { color: var(--muted); font-size: 13px; margin: 6px 0; }
      details { margin-top: 8px; }
      summary { cursor: pointer; color: var(--accent); font-size: 13px; }
      .evidence {
        margin-top: 8px; font-size: 12.5px; border-left: 2px solid var(--border);
        padding-left: 10px;
      }
      .evidence .ex { color: var(--muted); font-style: italic; }
      .j-supported { background: #143d2a; color: #79e3a8; }
      .j-somewhat_supported { background: #143425; color: #9fdcb8; }
      .j-neutral { background: #2a2f3a; color: #c5ccda; }
      .j-somewhat_adverse { background: #3a2a16; color: #e9c08a; }
      .j-adverse { background: #3d1717; color: #f29494; }
      .j-not_addressed, .j-unknown { background: #23262e; color: #8b93a3; }
      .breakdown { display: flex; flex-wrap: wrap; gap: 8px; margin: 4px 0 16px; }
      .hidden { display: none; }
    </style>
  </head>
  <body>
    <header>
      <h1>propCheck</h1>
      <p>Upload a zipped bundle of case documents. The orchestrator reads the documents, <strong>discovers the material propositions from their content</strong>, then judges each one against the whole bundle with an isolated Claude Code subagent.</p>
    </header>
    <main>
      <section class="panel" id="uploadPanel">
        <form id="form">
          <div class="field">
            <label for="bundle">Document bundle <span class="hint">— a .zip of case files (optionally containing an index/manifest)</span></label>
            <input id="bundle" name="bundle" type="file" accept=".zip,application/zip" required />
          </div>
          <details class="field">
            <summary style="cursor:pointer;color:var(--accent);font-size:13px">Override propositions (optional)</summary>
            <label for="propositions" style="margin-top:10px">Propositions <span class="hint">— one per line, verbatim. Leave empty (normal case) to let the orchestrator discover propositions from the documents' content.</span></label>
            <textarea id="propositions" name="propositions" placeholder="Leave empty — propositions are discovered from the documents.&#10;&#10;Only paste here to force a specific set (override), one per line, e.g.:&#10;The defendant signed the contract on 3 March 2021."></textarea>
          </details>
          <button id="submitBtn" type="submit">Analyze bundle</button>
        </form>
      </section>

      <section class="panel hidden" id="resultsPanel">
        <div id="statusLine"></div>
        <div class="bar"><span id="barFill"></span></div>
        <div class="breakdown" id="breakdown"></div>
        <div id="cards"></div>
      </section>
    </main>

    <script>
      const form = document.getElementById("form");
      const submitBtn = document.getElementById("submitBtn");
      const resultsPanel = document.getElementById("resultsPanel");
      const statusLine = document.getElementById("statusLine");
      const barFill = document.getElementById("barFill");
      const breakdownEl = document.getElementById("breakdown");
      const cardsEl = document.getElementById("cards");

      let pollTimer = null;

      function pill(judgement) {
        const j = judgement || "unknown";
        return `<span class="pill j-${j}">${j.replace(/_/g, " ")}</span>`;
      }

      function esc(s) {
        return String(s == null ? "" : s)
          .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const fd = new FormData(form);
        if (!fd.get("bundle") || !fd.get("bundle").size) {
          alert("Please choose a .zip bundle to upload.");
          return;
        }
        submitBtn.disabled = true;
        submitBtn.textContent = "Uploading…";
        try {
          const r = await fetch("/api/upload", { method: "POST", body: fd });
          const data = await r.json();
          if (!r.ok) throw new Error(data.error || "upload failed");
          resultsPanel.classList.remove("hidden");
          statusLine.textContent = "Bundle uploaded. Starting analysis…";
          poll(data.jobId);
        } catch (err) {
          alert("Upload failed: " + err.message);
          submitBtn.disabled = false;
          submitBtn.textContent = "Analyze bundle";
        }
      });

      function poll(jobId) {
        if (pollTimer) clearInterval(pollTimer);
        const tick = async () => {
          try {
            const r = await fetch("/api/jobs/" + encodeURIComponent(jobId));
            const d = await r.json();
            render(d);
            if (d.state === "done" || d.state === "error") {
              clearInterval(pollTimer);
              submitBtn.disabled = false;
              submitBtn.textContent = "Analyze another bundle";
            }
          } catch (err) {
            statusLine.textContent = "Lost connection: " + err.message;
          }
        };
        tick();
        pollTimer = setInterval(tick, 3000);
      }

      function render(d) {
        const total = d.propositionCount;
        const done = d.completedCount || 0;
        let label;
        if (d.state === "running") {
          label = total
            ? `Analyzing — ${done}/${total} propositions evaluated`
            : "Analyzing — surveying bundle and extracting propositions…";
        } else if (d.state === "done") {
          label = `Done — ${done} proposition(s) evaluated`;
        } else if (d.state === "error") {
          label = "Analysis failed. Check the service logs for details.";
        } else {
          label = "Working…";
        }
        statusLine.innerHTML = label;
        const pct = total ? Math.round((done / total) * 100) : (d.state === "done" ? 100 : 8);
        barFill.style.width = pct + "%";

        breakdownEl.innerHTML = Object.entries(d.breakdown || {})
          .map(([j, n]) => `${pill(j)} <span class="hint">×${n}</span>`)
          .join("");

        cardsEl.innerHTML = (d.results || [])
          .map((res) => {
            const ev = (res.evidence || [])
              .filter((e) => e.relevance && e.relevance !== "not_addressed")
              .map(
                (e) => `<div class="evidence">${pill(e.relevance)} <b>${esc(e.doc_id)}</b><br>${esc(e.reasoning)}${e.excerpt ? `<div class="ex">“${esc(e.excerpt)}”</div>` : ""}</div>`
              )
              .join("");
            const considered = (res.evidence || []).length;
            return `<div class="card">
              <h3>${esc(res.proposition_id)} ${pill(res.judgement)}</h3>
              <div>${esc(res.proposition_text)}</div>
              <div class="summary">${esc(res.summary)}</div>
              <details><summary>Evidence (${considered} doc(s) considered)</summary>${ev || '<div class="hint">No supporting/adverse documents.</div>'}</details>
            </div>`;
          })
          .join("");
      }
    </script>
  </body>
</html>
